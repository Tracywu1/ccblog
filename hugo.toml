baseURL = "https://Tracywu1.github.io/ccblog/"
languageCode = 'zh-cn'
title = 'Tracy 的技术星球'
theme = 'tracy-blog'

[pagination]
pagerSize = 3

[outputs]
home = ["HTML", "JSON"]

[outputFormats.JSON]
mediaType = "application/json"
baseName = "index"
isPlainText = true

[markup.tableOfContents]
  startLevel = 2
  endLevel = 4
  ordered = false

[markup.goldmark.renderer]
  unsafe = true

[params]
  description = "记录技术，分享生活"
  author = "CC"
