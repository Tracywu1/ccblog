<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: '#10b981',
          primary_hover: '#059669',
          bg_light: '#f8fafc',
        }
      }
    }
  }
</script>

<style>
  /* --- 导航栏核心修复 CSS --- */
  
  /* 1. 安全区域：防止鼠标移到空隙时菜单消失 */
  .submenu-safe-area {
    padding-top: 10px;
    margin-top: -5px;
  }

  /* 2. 菜单显示逻辑：只显示当前 hover 的直接子菜单 */
  li.group:hover > .submenu-container {
    display: block;
    animation: fadeIn 0.2s ease-in-out;
  }
  .submenu-container { display: none; }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 3. 三角旋转修复 (新增) */
  /* 默认状态：箭头 */
  .menu-arrow { transition: transform 0.2s; }
  
  /* 一级菜单(root): 默认朝下(0deg)，Hover时朝上(180deg) */
  li.is-root:hover > a > .menu-arrow { transform: rotate(180deg); }
  
  /* 二级菜单(sub): 默认朝右(-90deg)，Hover时朝下(0deg) */
  /* 注意：这里用 -90deg 让原本朝下的箭头指向右边 */
  li.is-sub > a > .menu-arrow { transform: rotate(-90deg); }
  li.is-sub:hover > a > .menu-arrow { transform: rotate(180deg); }

  .markdown-body .mermaid {
    overflow-x: auto;
    text-align: center;
    margin: 1.5rem 0;
  }

  .markdown-body .mermaid svg {
    height: auto;
    max-width: 100%;
  }

</style>

<link rel="stylesheet" href="{{ "css/github-markdown.min.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/typora-like.css" | relURL }}">
<script>window.__INDEX_JSON__ = "{{ "index.json" | relURL }}";</script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  mermaid.initialize({
    startOnLoad: false,
    securityLevel: 'loose',
    theme: 'default',
  });

  const runMermaid = async () => {
    const nodes = Array.from(document.querySelectorAll('.mermaid')).filter(
      (node) => !node.dataset.mermaidProcessed
    );

    if (nodes.length === 0) {
      return;
    }

    await mermaid.run({ nodes });
    nodes.forEach((node) => {
      node.dataset.mermaidProcessed = 'true';
    });
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      runMermaid().catch(console.error);
    }, { once: true });
  } else {
    runMermaid().catch(console.error);
  }
</script>
<script defer src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
<script defer src="{{ "js/search.js" | relURL }}"></script>
<script defer src="{{ "js/toc.js" | relURL }}"></script>
